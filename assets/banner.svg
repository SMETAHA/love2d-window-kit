<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">LÖVE Window Kit</title>
  <desc id="desc">Scrollable, zoomable, draggable windows for LÖVE2D</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#090d1b"/>
      <stop offset="0.55" stop-color="#151331"/>
      <stop offset="1" stop-color="#071d28"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff4f8b"/>
      <stop offset="0.5" stop-color="#9d6cff"/>
      <stop offset="1" stop-color="#42d9ff"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#4acff5" stroke-opacity=".07"/>
    </pattern>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#background)"/>
  <rect width="1200" height="360" rx="28" fill="url(#grid)"/>
  <circle cx="1040" cy="-30" r="210" fill="#8d5cff" opacity=".12" filter="url(#glow)"/>
  <circle cx="90" cy="390" r="210" fill="#27d9ff" opacity=".1" filter="url(#glow)"/>

  <g transform="translate(70 54)">
    <rect x="64" y="36" width="294" height="204" rx="13" fill="#0c1224" stroke="#39476c" stroke-width="3"/>
    <rect x="64" y="36" width="294" height="36" rx="13" fill="#182346"/>
    <path d="M64 60h294" stroke="#182346" stroke-width="24"/>
    <circle cx="88" cy="54" r="5" fill="#ff5b83"/><circle cx="105" cy="54" r="5" fill="#ffd166"/><circle cx="122" cy="54" r="5" fill="#49e0a5"/>
    <path d="M92 105h224M92 132h150M92 159h196M92 186h116" stroke="#51618c" stroke-width="8" stroke-linecap="round"/>
    <rect x="340" y="84" width="7" height="134" rx="3.5" fill="#1e2c50"/>
    <rect x="340" y="112" width="7" height="49" rx="3.5" fill="#4edcff"/>

    <rect x="0" y="0" width="210" height="152" rx="12" fill="#12172b" stroke="#ff5d9a" stroke-width="3"/>
    <rect x="0" y="0" width="210" height="32" rx="12" fill="#47213d"/>
    <path d="M0 22h210" stroke="#47213d" stroke-width="20"/>
    <rect x="24" y="56" width="66" height="54" rx="8" fill="#2a3152"/><rect x="108" y="56" width="66" height="54" rx="8" fill="#2a3152"/>
    <path d="M34 124h136" stroke="#ff5d9a" stroke-width="7" stroke-linecap="round"/>

    <g transform="translate(244 126)">
      <rect width="180" height="126" rx="12" fill="#101c28" stroke="#4de2c2" stroke-width="3"/>
      <rect width="180" height="30" rx="12" fill="#17433f"/>
      <path d="M0 21h180" stroke="#17433f" stroke-width="18"/>
      <path d="M20 96l30-26 24 12 32-38 25 24 28-17" fill="none" stroke="#4de2c2" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <g transform="translate(555 93)">
    <text x="0" y="0" fill="#ffffff" font-family="Inter,Segoe UI,sans-serif" font-size="56" font-weight="800" letter-spacing="-1">LÖVE Window Kit</text>
    <rect x="0" y="24" width="470" height="6" rx="3" fill="url(#accent)"/>
    <text x="0" y="82" fill="#c6d0ec" font-family="Inter,Segoe UI,sans-serif" font-size="25">Scrollable · Zoomable · Draggable</text>
    <text x="0" y="121" fill="#8391b4" font-family="Inter,Segoe UI,sans-serif" font-size="20">Layered input routing and touch support for LÖVE2D</text>
    <g transform="translate(0 154)" font-family="ui-monospace,SFMono-Regular,Consolas,monospace" font-size="16">
      <rect width="170" height="42" rx="21" fill="#ff4f8b" fill-opacity=".14" stroke="#ff4f8b"/>
      <text x="85" y="27" text-anchor="middle" fill="#ff9cbd">API 1.1.0</text>
      <rect x="188" width="170" height="42" rx="21" fill="#42d9ff" fill-opacity=".12" stroke="#42d9ff"/>
      <text x="273" y="27" text-anchor="middle" fill="#8be8ff">LÖVE 11.5</text>
    </g>
  </g>
</svg>
