name: Bug report
description: Report reproducible incorrect behavior
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to provide a focused reproduction.
  - type: input
    id: love-version
    attributes:
      label: LÖVE version
      placeholder: 11.5
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: Arch Linux, Windows 11, Android...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include code and the exact mouse, keyboard or touch sequence.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
